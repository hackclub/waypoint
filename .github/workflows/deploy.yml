name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SITE_URL: https://waypoint.loganpeterson.org
  CUSTOM_DOMAIN: waypoint.loganpeterson.org

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure custom domain
        run: echo "$CUSTOM_DOMAIN" > website/public/CNAME

      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          path: website
          node-version: 22.12.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
